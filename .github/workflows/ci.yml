name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org # Needed to make auth work for publishing

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Rebuild ReScript code
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Build documentation
        run: npm run build:docs

      - name: Upload documentation
        uses: actions/upload-pages-artifact@v4
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        with:
          path: ./dist

      - name: get-npm-version
        id: package-version
        uses: martinbeentjes/npm-get-version-action@v1.3.1

      - name: Get short commit hash
        id: vars
        run: echo "COMMIT_HASH=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Update version to -<commit-hash>
        run: npm version --workspaces --include-workspace-root=false --no-git-tag-version "${{ steps.package-version.outputs.current-version }}-experimental-${{ env.COMMIT_HASH }}"

      - name: Package npm workspaces
        run: npm pack --workspaces

      - name: Upload npm package artifact
        uses: actions/upload-artifact@v7
        with:
          name: npm-packages
          path: packages/*/*.tgz

      - name: Publish npm packages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
        run: |
          for package in packages/*; do
            if [ -f "$package/package.json" ]; then
              npm publish --workspace "$package" --access public --tag experimental
            fi
          done

  deploy-docs:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
